<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="ambient">
<div class="orb orb1"></div>
<div class="orb orb2"></div>
</div>

<div class="sidebar">
<div class="sidebar-brand">
<div class="brand-icon">🌙</div>
<span class="brand-name">Moodlytic</span>
</div>

<div class="nav-section">
<div class="nav-label">Main</div>

<a class="nav-item" href="mood.html">
<span class="nav-icon">📊</span> Mood Tracker
</a>

<a class="nav-item active" href="journal.html">
<span class="nav-icon">📓</span> Journal
</a>

<a class="nav-item" href="insights.html">
<span class="nav-icon">✨</span> Insights
</a>

<div class="nav-label" style="margin-top:12px;">Support</div>

<a class="nav-item" href="resources.html">
<span class="nav-icon">🤝</span> Resources
</a>

<a class="nav-item" href="profile.html">
<span class="nav-icon">⚙️</span> Settings
</a>

</div>

<div class="sidebar-footer">
<div class="user-card">
<div class="avatar">S</div>
<div>
<div class="user-name">Sarah Johnson</div>
<div class="user-status">● Feeling Good</div>
</div>
</div>
</div>
</div>

<div class="main">

<div class="journal-list">

<div class="list-header">
<h2>📓 My Journal</h2>

<div class="search-wrap">
<span class="search-icon">🔍</span>
<input class="search-input" type="text" placeholder="Search entries...">
</div>

</div>

<button class="new-entry-btn">✦ New Entry</button>

<div class="entries-list">

<div class="entry-card active">
<div class="entry-date">Oct 21, 2024 · 09:15 AM</div>
<div class="entry-title">Finding Stillness in the Morning Fog</div>
</div>

<div class="entry-card">
<div class="entry-date">Oct 17, 2024 · 11:48 AM</div>
<div class="entry-title">New Project Breakthrough</div>
</div>

</div>
</div>

<div class="editor">

<div class="editor-header">

<div class="editor-meta">
<span class="editor-date" id="editorDate"></span>

<div class="editor-mood-pick">
<span class="emk active">😊</span>
<span class="emk">😢</span>
<span class="emk">😰</span>
<span class="emk">😄</span>
<span class="emk">🙏</span>
</div>

</div>

<div class="editor-actions">
<button class="editor-btn" id="saveBtn">💾 Save</button>
</div>

</div>

<input class="title-input" id="entryTitle" type="text" placeholder="Entry title...">

<div class="divider-line"></div>

<textarea class="body-input" id="entryBody" placeholder="What's on your mind?"></textarea>

<div class="word-count" id="wordCount">0 words</div>

</div>
</div>


<script>

const entries = [

{
date:"October 21, 2024 · 09:15 AM",
title:"Finding Stillness in the Morning Fog",
body:"Today I woke up before the alarm and sat by the window."
},

{
date:"October 17, 2024 · 11:48 AM",
title:"New Project Breakthrough",
body:"The architecture finally clicked."
}

]

function loadEntry(index){

document.querySelectorAll(".entry-card").forEach((c,i)=>{
c.classList.toggle("active",i===index)
})

document.getElementById("editorDate").textContent=entries[index].date
document.getElementById("entryTitle").value=entries[index].title
document.getElementById("entryBody").value=entries[index].body

updateWordCount()

}

function newEntry(){

document.querySelectorAll(".entry-card").forEach(c=>{
c.classList.remove("active")
})

document.getElementById("editorDate").textContent=new Date().toLocaleString()

document.getElementById("entryTitle").value=""
document.getElementById("entryBody").value=""

updateWordCount()

document.getElementById("entryBody").focus()

}

function updateWordCount(){

const text=document.getElementById("entryBody").value

const words=text.trim().split(/\s+/).filter(w=>w).length

document.getElementById("wordCount").textContent=words+" words"

}

document.querySelector(".new-entry-btn").addEventListener("click",newEntry)

document.querySelectorAll(".entry-card").forEach((card,i)=>{
card.addEventListener("click",()=>loadEntry(i))
})

document.getElementById("entryBody").addEventListener("input",updateWordCount)

document.getElementById("saveBtn").addEventListener("click",function(){

this.textContent="✓ Saved!"

setTimeout(()=>{
this.textContent="💾 Save"
},2000)

})

document.querySelectorAll(".emk").forEach(em=>{

em.addEventListener("click",function(){

document.querySelectorAll(".emk").forEach(e=>e.classList.remove("active"))

this.classList.add("active")

})

})

loadEntry(0)

</script>

</body>
</html>
